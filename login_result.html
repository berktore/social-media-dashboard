<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNexus - Giris</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-400">SocialNexus</h1>
            <p class="text-gray-400 mt-2">Sosyal Medya Paneli</p>
        </div>
        <form method="POST" class="bg-gray-900 rounded-xl p-6 space-y-4 shadow-xl">
            
            <div>
                <label class="block text-sm text-gray-400 mb-1">Kullanici Adi</label>
                <input type="text" name="username" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Sifre</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-lg py-2 font-medium transition">
                Giris Yap
            </button>
        </form>
    </div>
</body>
</html>
